name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Set up uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: |
        uv pip install --system .
        uv pip install --system -r lunch-web-app/requirements.txt

    - name: Run Python compile checks
      run: python -m compileall -q lunch-web-app/backend scripts
