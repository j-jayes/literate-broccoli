title: Nexer RevealJS Presentation
version: 0.1.0
quarto-required: ">=1.5.0"
contributes:
  formats:
    revealjs:
      template-partials:
        - title-slide.html
      theme:
        - default
        - theme.scss
      logo: nexer-logo-black.svg
      footer: "NEXER"
      slide-number: c/t
      show-slide-number: all
      progress: false
      controls-layout: edges
      navigation-mode: linear
      preview-links: auto
      transition: none
      background-transition: fade
      scrollable: true
      center: false
      width: 1280
      height: 720
      margin: 0.06
      code-copy: hover
      code-overflow: wrap
      chalkboard: false
      title-slide-attributes:
        data-background-color: "#f0f0f0"
